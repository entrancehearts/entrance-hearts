  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#06061a;
      --surface:rgba(255,255,255,0.045);
      --surface2:rgba(255,255,255,0.07);
      --chat-bg:#08081e;
      --border:rgba(255,255,255,0.09);
      --pink:#FF1493;
      --pink-light:#FF6B9D;
      --pink-pale:rgba(255,20,147,0.08);
      --text:rgba(255,255,255,0.93);
      --text-muted:rgba(255,255,255,0.55);
      --text-dim:rgba(255,255,255,0.32);
      --online:#22c55e;
      --sent-bg:linear-gradient(135deg,#FF1493,#e91281);
      --recv-bg:rgba(18,16,46,0.98);
      --nav-h:60px;
      --input-h:64px;
    }
    html,body{height:100%;overflow:hidden;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

    /* ── AMBIENT ── */
    .ambient{position:fixed;pointer-events:none;z-index:0;}
    .ambient-1{top:-150px;left:-100px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(255,20,147,0.13),transparent 70%);animation:ambi1 28s ease-in-out infinite;}
    .ambient-2{bottom:-150px;right:-100px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(110,40,210,0.10),transparent 70%);animation:ambi2 34s ease-in-out infinite;}
    @keyframes ambi1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
    @keyframes ambi2{0%,100%{transform:translate(0,0)}50%{transform:translate(-35px,-40px)}}

    /* ══════════════════════════════════════════
       CHAT LIST VIEW
    ══════════════════════════════════════════ */
    .list-view{display:flex;flex-direction:column;height:100%;position:relative;z-index:1;}

    /* ── NAVBAR ── */
    .navbar{height:var(--nav-h);padding:0 16px;background:rgba(6,6,26,0.97);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:100;}
    .logo{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,var(--pink),var(--pink-light));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
    .desktop-nav{display:none;gap:4px;align-items:center;}
    .nav-link{color:var(--text-muted);padding:6px 12px;border-radius:50px;text-decoration:none;font-size:0.78rem;font-weight:500;transition:all 0.2s;}
    .nav-link:hover{color:var(--pink-light);background:var(--pink-pale);}
    .nav-link.active{color:var(--pink-light);}
    .nav-cta{background:linear-gradient(135deg,var(--pink),var(--pink-light));color:white;padding:6px 16px;border-radius:50px;text-decoration:none;font-size:0.78rem;font-weight:700;}
    .hamburger{background:var(--pink-pale);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--pink-light);cursor:pointer;font-size:1rem;}
    @media(min-width:768px){.desktop-nav{display:flex;}.hamburger{display:none;}}
    .mobile-menu{position:fixed;top:68px;right:-100%;width:240px;background:rgba(10,8,32,0.98);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:12px;z-index:200;transition:right 0.3s ease;box-shadow:0 20px 50px rgba(0,0,0,0.6);}
    .mobile-menu.open{right:12px;}
    .mob-item{display:block;padding:10px 14px;color:var(--text);text-decoration:none;border-radius:12px;font-size:0.84rem;transition:all 0.18s;}
    .mob-item:hover,.mob-item:active{background:var(--pink-pale);color:var(--pink-light);}

    /* ── SEARCH BAR ── */
    .search-wrap{padding:12px 16px 4px;flex-shrink:0;}
    .search-inner{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:10px 14px;transition:border-color 0.2s;}
    .search-inner:focus-within{border-color:rgba(255,20,147,0.3);}
    .search-inner i{color:var(--text-dim);font-size:0.85rem;}
    .search-inner input{background:none;border:none;color:var(--text);font-size:0.85rem;font-family:'Inter',sans-serif;outline:none;width:100%;}
    .search-inner input::placeholder{color:var(--text-dim);}

    /* ── CHAT LIST ── */
    .chat-list-scroll{flex:1;overflow-y:auto;padding:8px 12px 8px;display:flex;flex-direction:column;gap:2px;}
    .chat-list-scroll::-webkit-scrollbar{width:3px;}
    .chat-list-scroll::-webkit-scrollbar-thumb{background:rgba(255,20,147,0.2);border-radius:10px;}

    /* ── CHAT ROW ── */
    .chat-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:18px;cursor:pointer;transition:all 0.18s;position:relative;}
    .chat-row:hover,.chat-row:active{background:rgba(255,255,255,0.04);}
    .chat-row.unread-row{background:rgba(255,20,147,0.04);}
    .chat-av-wrap{position:relative;flex-shrink:0;}
    .chat-av{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--pink-light));display:flex;align-items:center;justify-content:center;font-size:1.4rem;overflow:hidden;border:2px solid transparent;transition:border-color 0.2s;}
    .chat-av img{width:100%;height:100%;object-fit:cover;}
    .chat-row.unread-row .chat-av{border-color:rgba(255,20,147,0.4);}
    .online-dot{position:absolute;bottom:2px;right:2px;width:13px;height:13px;border-radius:50%;border:2px solid var(--bg);background:#555;transition:background 0.3s;}
    .online-dot.online{background:var(--online);box-shadow:0 0 6px rgba(34,197,94,0.6);}
    .chat-row-info{flex:1;min-width:0;}
    .chat-row-name{font-weight:700;font-size:0.92rem;margin-bottom:3px;display:flex;align-items:center;gap:6px;}
    .chat-row-last{font-size:0.75rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
    .chat-row.unread-row .chat-row-last{color:var(--text);font-weight:500;}
    .chat-row-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
    .chat-row-time{font-size:0.62rem;color:var(--text-dim);}
    .chat-row.unread-row .chat-row-time{color:var(--pink-light);}
    .unread-pill{background:linear-gradient(135deg,var(--pink),var(--pink-light));color:white;font-size:0.6rem;font-weight:700;padding:2px 7px;border-radius:20px;min-width:20px;text-align:center;}

    /* Divider / section label */
    .list-section{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);padding:8px 14px 4px;}

    /* ── EMPTY ── */
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;flex:1;}
    .empty-icon{font-size:3rem;margin-bottom:16px;opacity:0.4;}
    .empty-title{font-weight:700;font-size:1rem;color:var(--text-muted);margin-bottom:8px;}
    .empty-sub{font-size:0.8rem;color:var(--text-dim);line-height:1.5;margin-bottom:20px;}
    .btn-discover{background:linear-gradient(135deg,var(--pink),var(--pink-light));color:white;padding:12px 28px;border-radius:50px;text-decoration:none;font-weight:700;font-size:0.85rem;box-shadow:0 4px 20px rgba(255,20,147,0.35);}

    /* ── SKELETON ── */
    .skel{background:rgba(255,255,255,0.05);border-radius:8px;animation:skelPulse 1.5s ease-in-out infinite;}
    @keyframes skelPulse{0%,100%{opacity:0.35}50%{opacity:0.65}}
    .skel-row{display:flex;align-items:center;gap:12px;padding:10px 12px;}

    /* ── BOTTOM NAV ── */
    .bottom-nav{height:64px;padding-bottom:env(safe-area-inset-bottom);background:rgba(6,6,26,0.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;flex-shrink:0;position:relative;z-index:100;}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text-dim);text-decoration:none;font-size:0.58rem;font-weight:600;padding:6px 14px;border-radius:14px;transition:all 0.2s;position:relative;}
    .nav-item i{font-size:1.2rem;transition:all 0.2s;}
    .nav-item:hover,.nav-item.active{color:var(--pink-light);}
    .nav-item.active i{filter:drop-shadow(0 0 8px rgba(255,20,147,0.6));}
    .nav-notif{position:absolute;top:2px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--pink);border:2px solid var(--bg);}

    /* ══════════════════════════════════════════
       CHAT WINDOW — SLIDES IN FROM RIGHT
    ══════════════════════════════════════════ */
    .chat-window{position:fixed;inset:0;background:var(--chat-bg);z-index:500;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);will-change:transform;}
    .chat-window.open{transform:translateX(0);}

    /* Subtle chat background pattern */
    .chat-window::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 20% 50%,rgba(255,20,147,0.025) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(255,107,157,0.02) 0%,transparent 50%);pointer-events:none;}

    /* ── CHAT HEADER ── */
    .chat-hdr{height:calc(var(--nav-h) + env(safe-area-inset-top,0px));padding:0 12px;padding-top:env(safe-area-inset-top,0px);background:rgba(6,6,26,0.97);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;z-index:10;}
    .back-btn{width:40px;height:40px;border-radius:50%;background:none;border:none;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:background 0.2s;flex-shrink:0;}
    .back-btn:hover,.back-btn:active{background:rgba(255,255,255,0.07);}
    .hdr-av-wrap{position:relative;flex-shrink:0;cursor:pointer;}
    .hdr-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--pink-light));display:flex;align-items:center;justify-content:center;font-size:1.1rem;overflow:hidden;}
    .hdr-av img{width:100%;height:100%;object-fit:cover;}
    .hdr-online-dot{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;border:2px solid var(--chat-bg);background:#555;transition:background 0.3s;display:none;}
    .hdr-online-dot.online{display:block;background:var(--online);box-shadow:0 0 5px rgba(34,197,94,0.6);}
    .hdr-info{flex:1;min-width:0;cursor:pointer;}
    .hdr-name{font-weight:700;font-size:0.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .hdr-status{font-size:0.65rem;color:var(--text-dim);margin-top:1px;min-height:14px;transition:color 0.2s;}
    .hdr-status.online-text{color:var(--online);}
    .hdr-actions{display:flex;gap:4px;}
    .hdr-btn{width:38px;height:38px;border-radius:50%;background:none;border:none;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.95rem;transition:all 0.2s;}
    .hdr-btn:hover{background:rgba(255,255,255,0.07);color:var(--pink-light);}

    /* ── MESSAGES AREA ── */
    .msgs-area{flex:1;overflow-y:auto;padding:12px 12px 8px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth;position:relative;z-index:1;}
    .msgs-area::-webkit-scrollbar{width:3px;}
    .msgs-area::-webkit-scrollbar-thumb{background:rgba(255,20,147,0.2);border-radius:10px;}

    /* Date separator */
    .date-sep{text-align:center;margin:10px 0 4px;user-select:none;}
    .date-sep span{background:rgba(255,255,255,0.06);color:var(--text-dim);font-size:0.62rem;font-weight:600;padding:4px 14px;border-radius:20px;letter-spacing:0.5px;}

    /* ── MESSAGE ROWS ── */
    .msg-wrap{display:flex;align-items:flex-end;gap:6px;margin-bottom:2px;}
    .msg-wrap.sent{flex-direction:row-reverse;}
    .msg-wrap.received{flex-direction:row;}

    /* Avatar for received */
    .msg-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--pink-light));display:flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0;overflow:hidden;align-self:flex-end;margin-bottom:2px;}
    .msg-av img{width:100%;height:100%;object-fit:cover;}
    .msg-av.hide{visibility:hidden;}

    .msg-col{display:flex;flex-direction:column;max-width:78%;gap:1px;}
    .msg-wrap.sent .msg-col{align-items:flex-end;}
    .msg-wrap.received .msg-col{align-items:flex-start;}

    /* Bubble */
    .bubble{padding:9px 13px;border-radius:18px;font-size:0.87rem;word-break:break-word;line-height:1.5;position:relative;cursor:pointer;transition:opacity 0.15s;}
    .bubble:active{opacity:0.85;}
    .bubble.sent{background:var(--sent-bg);color:white;border-bottom-right-radius:4px;box-shadow:0 2px 8px rgba(255,20,147,0.3);}
    .bubble.recv{background:var(--recv-bg);color:var(--text);border:1px solid rgba(255,255,255,0.06);border-bottom-left-radius:4px;}
    .bubble.sent + .bubble.sent{border-top-right-radius:6px;}
    .bubble.recv + .bubble.recv{border-top-left-radius:6px;}

    /* Message footer */
    .msg-foot{display:flex;align-items:center;gap:4px;padding:0 4px;margin-top:1px;}
    .msg-wrap.sent .msg-foot{flex-direction:row-reverse;}
    .msg-time{font-size:0.58rem;color:var(--text-dim);}
    .ticks{font-size:0.65rem;line-height:1;}
    .ticks.delivered{color:rgba(255,255,255,0.35);}
    .ticks.seen{color:#60a5fa;}

    /* ── VOICE BUBBLE ── */
    .voice-bubble{display:flex;align-items:center;gap:10px;min-width:180px;max-width:240px;}
    .voice-play{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0;transition:background 0.2s;}
    .voice-play:hover{background:rgba(255,255,255,0.28);}
    .voice-waveform{flex:1;height:28px;display:flex;align-items:center;gap:2px;}
    .wv-bar{width:3px;border-radius:2px;background:rgba(255,255,255,0.45);transition:background 0.2s;}
    .voice-dur{font-size:0.62rem;color:rgba(255,255,255,0.65);flex-shrink:0;}
    /* For received voice */
    .bubble.recv .voice-play{background:rgba(255,20,147,0.15);}
    .bubble.recv .wv-bar{background:rgba(255,20,147,0.4);}
    .bubble.recv .voice-dur{color:var(--text-dim);}

    /* ── TYPING INDICATOR ── */
    #typingIndicator{padding:4px 0;}
    .typing-bubble{display:inline-flex;align-items:center;gap:4px;background:var(--recv-bg);border:1px solid rgba(255,255,255,0.06);padding:10px 16px;border-radius:18px;border-bottom-left-radius:4px;}
    .t-dot{width:6px;height:6px;border-radius:50%;background:var(--pink-light);animation:tdot 1.3s ease-in-out infinite;}
    .t-dot:nth-child(2){animation-delay:0.18s;}
    .t-dot:nth-child(3){animation-delay:0.36s;}
    @keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-5px);opacity:1}}

    /* Scroll to bottom button */
    .scroll-down{position:absolute;bottom:80px;right:16px;width:38px;height:38px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--pink-light);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:0.9rem;box-shadow:0 4px 16px rgba(0,0,0,0.4);z-index:5;}
    .scroll-down.show{display:flex;}
    .scroll-unread{position:absolute;top:-8px;right:-4px;background:var(--pink);color:white;font-size:0.5rem;font-weight:700;padding:1px 5px;border-radius:10px;}

    /* ── REACTION PICKER ── */
    .reaction-picker{position:fixed;background:#1e1e30;border:1px solid rgba(255,20,147,0.25);border-radius:50px;padding:8px 12px;display:none;gap:6px;z-index:600;box-shadow:0 8px 32px rgba(0,0,0,0.6);animation:reactionIn 0.2s ease;}
    .reaction-picker.show{display:flex;}
    @keyframes reactionIn{from{opacity:0;transform:scale(0.8) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .rxn-btn{font-size:1.3rem;cursor:pointer;border:none;background:none;padding:2px 4px;border-radius:8px;transition:transform 0.15s;}
    .rxn-btn:hover{transform:scale(1.3);}

    /* Message reactions display */
    .msg-reactions{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px;}
    .msg-rxn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);padding:2px 7px;border-radius:20px;font-size:0.75rem;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:3px;}
    .msg-rxn.mine{background:rgba(255,20,147,0.15);border-color:rgba(255,20,147,0.3);}
    .msg-rxn:hover{transform:scale(1.1);}

    /* ── REPLY PREVIEW ── */
    .reply-preview{display:none;align-items:center;gap:10px;background:rgba(255,20,147,0.06);border-left:3px solid var(--pink);padding:8px 14px;margin:0 0 0;flex-shrink:0;}
    .reply-preview.show{display:flex;}
    .reply-content{flex:1;min-width:0;}
    .reply-name{font-size:0.7rem;color:var(--pink-light);font-weight:600;}
    .reply-text{font-size:0.75rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .reply-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1rem;padding:4px;flex-shrink:0;}

    /* ── INPUT AREA ── */
    .input-wrap{flex-shrink:0;background:rgba(6,6,26,0.97);border-top:1px solid var(--border);padding:8px 10px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));position:relative;z-index:10;}
    .input-row{display:flex;align-items:flex-end;gap:8px;}
    .msg-textarea{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,20,147,0.15);border-radius:22px;padding:11px 16px;color:var(--text);font-size:0.88rem;font-family:'Inter',sans-serif;outline:none;resize:none;max-height:130px;line-height:1.45;transition:border-color 0.2s;}
    .msg-textarea:focus{border-color:rgba(255,20,147,0.4);background:rgba(255,20,147,0.03);}
    .msg-textarea::placeholder{color:var(--text-dim);}
    .icon-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all 0.22s;flex-shrink:0;}
    .send-btn{background:linear-gradient(135deg,var(--pink),var(--pink-light));color:white;box-shadow:0 3px 12px rgba(255,20,147,0.4);}
    .send-btn:hover{transform:scale(1.08);box-shadow:0 4px 18px rgba(255,20,147,0.55);}
    .send-btn:active{transform:scale(0.96);}
    .mic-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,20,147,0.15)!important;color:var(--pink-light);}
    .mic-btn:hover{background:rgba(255,20,147,0.12);}
    .mic-btn.recording{background:rgba(255,20,147,0.18);border-color:var(--pink)!important;color:var(--pink);animation:recPulse 1s ease-in-out infinite;}
    @keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,20,147,0.4)}50%{box-shadow:0 0 0 8px rgba(255,20,147,0)}}

    /* Voice recording bar */
    .voice-rec-bar{display:none;align-items:center;gap:12px;background:rgba(6,6,26,0.97);border-top:1px solid rgba(255,255,255,0.09);padding:12px 16px;}
    .voice-rec-bar.show{display:flex;}
    .rec-pulse{width:10px;height:10px;border-radius:50%;background:var(--pink);flex-shrink:0;animation:recdot 1s ease-in-out infinite;}
    @keyframes recdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.8)}}
    .rec-timer-txt{font-size:0.9rem;font-weight:600;color:var(--pink-light);flex:1;}
    .rec-waves{display:flex;align-items:center;gap:2px;height:24px;}
    .rec-wave-bar{width:3px;background:var(--pink-light);border-radius:2px;opacity:0.6;animation:recWave 0.6s ease-in-out infinite;}
    .rec-wave-bar:nth-child(2){animation-delay:0.1s;height:14px;}
    .rec-wave-bar:nth-child(3){animation-delay:0.2s;height:18px;}
    .rec-wave-bar:nth-child(4){animation-delay:0.3s;height:10px;}
    .rec-wave-bar:nth-child(5){animation-delay:0.15s;height:16px;}
    @keyframes recWave{0%,100%{transform:scaleY(0.5)}50%{transform:scaleY(1)}}
    .rec-cancel{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:50px;color:var(--text-muted);font-size:0.75rem;padding:6px 16px;cursor:pointer;font-family:'Inter',sans-serif;}
    .rec-send{background:linear-gradient(135deg,var(--pink),var(--pink-light));border:none;border-radius:50px;color:white;font-size:0.75rem;font-weight:700;padding:6px 16px;cursor:pointer;font-family:'Inter',sans-serif;}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:#1e1e30;border:1px solid rgba(255,20,147,0.25);padding:10px 22px;border-radius:50px;font-size:0.8rem;z-index:9999;opacity:0;transition:all 0.28s;white-space:nowrap;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,0.5);}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* ── INTRO GREETING (empty chat) ── */
    .chat-intro{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:30px;user-select:none;}
    .chat-intro-av{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--pink-light));display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin-bottom:14px;box-shadow:0 4px 20px rgba(255,20,147,0.3);}
    .chat-intro-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .chat-intro-name{font-weight:800;font-size:1.1rem;margin-bottom:6px;}
    .chat-intro-sub{font-size:0.78rem;color:var(--text-dim);line-height:1.5;}
    .chat-intro-heart{font-size:2rem;animation:heartbeat 1.8s ease-in-out infinite;display:block;margin-top:16px;}
    @keyframes heartbeat{0%,100%{transform:scale(1)}20%{transform:scale(1.15)}40%{transform:scale(1)}}
    .icebreakers{margin-top:20px;width:100%;max-width:300px;}
    .ice-label{font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,107,157,0.85);margin-bottom:10px;text-align:center;}
    .ice-chips{display:flex;flex-direction:column;gap:8px;}
    .ice-chip{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:50px;padding:9px 16px;font-size:0.78rem;color:rgba(255,255,255,0.75);cursor:pointer;font-family:'Inter',sans-serif;text-align:left;transition:all 0.18s;-webkit-tap-highlight-color:transparent;outline:none;}
    .ice-chip:hover{background:rgba(255,20,147,0.1);border-color:rgba(255,20,147,0.25);color:rgba(255,255,255,0.95);}
    .ice-chip:active{transform:scale(0.97);}
    .msg-search-bar{display:none;padding:8px 14px;background:rgba(6,6,26,0.97);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;align-items:center;}
    .msg-search-bar.show{display:flex;}
    .msg-search-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:7px 10px;font-size:0.82rem;color:var(--text);font-family:'Inter',sans-serif;outline:none;}
    .msg-search-input:focus{border-color:rgba(255,20,147,0.3);}
    .msg-search-count{font-size:0.7rem;color:var(--text-dim);white-space:nowrap;flex-shrink:0;}
    .msg-search-close{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:4px 6px;border-radius:6px;font-size:0.85rem;}
    .msg-search-close:hover{color:var(--text);background:rgba(255,255,255,0.07);}
    .msg-wrap.search-dim{opacity:0.2;}
    .msg-wrap.search-match .bubble{outline:2px solid rgba(255,20,147,0.5);outline-offset:2px;border-radius:inherit;}

      .input-wrap{padding:10px 20px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));}
    }

<script>
  /* ══════════════════════════════════════════════════
     STATE
  ══════════════════════════════════════════════════ */
  let myId        = null;
  let myProfile   = null;
  let partner     = null;
  let allChatData = [];

  let msgChannel  = null;
  let typChan     = null;
  let statusInt   = null;
  let pingInt     = null;

  let typingTimer    = null;
  let isTypingNow    = false;
  let typingShowTimer= null;

  let mediaRec    = null;
  let audioChunks = [];
  let recInt      = null;
  let recSecs     = 0;

  let replyTo     = null;
  let activeRxnId = null;
  let longPressTimer = null;

  /* ══════════════════════════════════════════════════
     UTILS
  ══════════════════════════════════════════════════ */
  function esc(s){ if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
  function trunc(s,n){ return s&&s.length>n?s.slice(0,n)+'…':s||''; }

  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3000);
  }

  function timeAgo(d){
    if(!d) return '';
    const diff=Math.floor((Date.now()-new Date(d))/1000);
    if(diff<60) return 'just now';
    if(diff<3600) return Math.floor(diff/60)+'m ago';
    if(diff<86400) return Math.floor(diff/3600)+'h ago';
    return Math.floor(diff/86400)+'d ago';
  }

  function chatTime(d){
    if(!d) return '';
    const dt=new Date(d);
    const now=new Date();
    const isToday=dt.toDateString()===now.toDateString();
    const isYest=dt.toDateString()===new Date(now-86400000).toDateString();
    if(isToday) return dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    if(isYest) return 'Yesterday';
    return dt.toLocaleDateString([],{month:'short',day:'numeric'});
  }

  function msgTimeStr(d){
    return new Date(d).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  }

  function isOnline(ls){
    return ls&&(Date.now()-new Date(ls).getTime())<90000;
  }

  function lastSeenText(ls){
    if(!ls) return 'Offline';
    if(isOnline(ls)) return 'Online now';
    const diff=Math.floor((Date.now()-new Date(ls))/1000);
    if(diff<3600) return 'Last seen '+Math.floor(diff/60)+'m ago';
    if(diff<86400) return 'Last seen '+Math.floor(diff/3600)+'h ago';
    if(diff<172800) return 'Last seen yesterday';
    return 'Last seen '+Math.floor(diff/86400)+'d ago';
  }

  function autoGrow(el){
    el.style.height='auto';
    el.style.height=Math.min(el.scrollHeight,130)+'px';
  }

  function handleKey(e){
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); }
  }

  function logout(){
    supabaseClient.auth.signOut();
    window.location.href='login.html';
  }

  /* ══════════════════════════════════════════════════
     INIT
  ══════════════════════════════════════════════════ */
  async function init(){
    try{
      const {data}=await supabaseClient.auth.getSession();
      if(!data.session){ window.location.href='login.html'; return; }
      myId=data.session.user.id;

      const {data:prof}=await supabaseClient.from('profiles').select('*').eq('id',myId).single();
      myProfile=prof||{};

      if(myProfile.role==='admin'){
        document.getElementById('adminNavLink').style.display='';
        document.getElementById('adminMobLink').style.display='';
      }

      await setOnline(true);
      pingInt=setInterval(()=>setOnline(true),25000);
      document.addEventListener('visibilitychange',()=>setOnline(!document.hidden));
      window.addEventListener('beforeunload',()=>setOnline(false));

      await loadChats();
    } catch(e){
      console.error('Init error',e);
      showToast('❌ Failed to load. Please refresh.');
    }
  }

  /* ══════════════════════════════════════════════════
     ONLINE STATUS
  ══════════════════════════════════════════════════ */
  async function setOnline(v){
    try{
      await supabaseClient.from('profiles').update({last_seen:v?new Date().toISOString():null}).eq('id',myId);
    }catch{}
  }

  /* ══════════════════════════════════════════════════
     LOAD CHATS LIST
  ══════════════════════════════════════════════════ */
  async function loadChats(){
    const scroll=document.getElementById('chatListScroll');
    try{
      // Get people I liked
      const {data:myLikes}=await supabaseClient.from('likes').select('to_user').eq('from_user',myId);
      const likedIds=(myLikes||[]).map(l=>l.to_user);

      if(!likedIds.length){ showEmpty(); return; }

      // Get mutual likes (matches)
      const {data:mutual}=await supabaseClient.from('likes').select('from_user').eq('to_user',myId).in('from_user',likedIds);
      const matchIds=(mutual||[]).map(m=>m.from_user);

      if(!matchIds.length){ showEmpty(); return; }

      // Get profiles
      const {data:profiles}=await supabaseClient.from('profiles').select('id,name,avatar_url,last_seen,category').in('id',matchIds);

      // Build chat data with last message + unread
      allChatData=await Promise.all((profiles||[]).map(async p=>{
        const pair=[myId,p.id].sort().join('-');

        const {data:msgs}=await supabaseClient.from('messages').select('text,created_at,from_user,seen,is_voice')
          .or(`and(from_user.eq.${myId},to_user.eq.${p.id}),and(from_user.eq.${p.id},to_user.eq.${myId})`)
          .order('created_at',{ascending:false}).limit(1);

        const {count:unread}=await supabaseClient.from('messages').select('*',{count:'exact',head:true})
          .eq('from_user',p.id).eq('to_user',myId).eq('seen',false);

        const last=msgs?.[0];
        let lastText='Say hello 👋';
        if(last){
          const prefix=last.from_user===myId?'You: ':'';
          lastText=last.is_voice?prefix+'🎤 Voice message':prefix+last.text;
        }
        return {...p,lastMsg:lastText,lastTime:last?.created_at||null,unread:unread||0};
      }));

      allChatData.sort((a,b)=>new Date(b.lastTime||0)-new Date(a.lastTime||0));
      renderChatList(allChatData);
    } catch(e){
      console.error('loadChats error',e);
      showEmpty('Failed to load chats.');
    }
  }

  function renderChatList(list){
    const scroll=document.getElementById('chatListScroll');
    if(!list.length){ showEmpty(); return; }

    const online=list.filter(c=>isOnline(c.last_seen));
    const offline=list.filter(c=>!isOnline(c.last_seen));

    let html='';
    if(online.length){
      html+='<div class="list-section">🟢 Online Now</div>';
      html+=online.map(c=>chatRowHtml(c)).join('');
    }
    if(offline.length){
      if(online.length) html+='<div class="list-section">Recent</div>';
      html+=offline.map(c=>chatRowHtml(c)).join('');
    }
    scroll.innerHTML=html;
  }

  function chatRowHtml(c){
    const av=c.avatar_url
      ?`<img src="${esc(c.avatar_url)}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='👤'"/>`
      :(c.name?c.name[0].toUpperCase():'👤');
    const dotCls=isOnline(c.last_seen)?'online':'';
    return `<div class="chat-row ${c.unread>0?'unread-row':''}" onclick="openChat('${c.id}','${esc(c.name||'User')}','${esc(c.avatar_url||'')}','${esc(c.category||'')}')">
      <div class="chat-av-wrap">
        <div class="chat-av">${av}</div>
        <div class="online-dot ${dotCls}"></div>
      </div>
      <div class="chat-row-info">
        <div class="chat-row-name">${esc(c.name||'User')}${c.unread>0?'':''}</div>
        <div class="chat-row-last">${esc(trunc(c.lastMsg,48))}</div>
      </div>
      <div class="chat-row-meta">
        <div class="chat-row-time">${chatTime(c.lastTime)}</div>
        ${c.unread>0?`<div class="unread-pill">${c.unread}</div>`:''}
      </div>
    </div>`;
  }

  function showEmpty(msg){
    document.getElementById('chatListScroll').innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">💬</div>
        <div class="empty-title">No matches yet</div>
        <div class="empty-sub">${msg||'Like profiles in Discover to get mutual matches and start chatting!'}</div>
        <a href="browse.html" class="btn-discover">🔥 Discover Matches</a>
      </div>`;
  }

  function filterChats(){
    const q=document.getElementById('chatSearch').value.toLowerCase();
    if(!q){ renderChatList(allChatData); return; }
    renderChatList(allChatData.filter(c=>(c.name||'').toLowerCase().includes(q)));
  }

  /* ══════════════════════════════════════════════════
     OPEN / CLOSE CHAT
  ══════════════════════════════════════════════════ */
  function openChat(userId,userName,userAvatar,userCat){
    partner={id:userId,name:userName,avatar:userAvatar,category:userCat};

    // Set header
    const hdrAv=document.getElementById('hdrAv');
    if(userAvatar){
      hdrAv.innerHTML=`<img src="${esc(userAvatar)}" onerror="this.style.display='none';this.parentElement.innerHTML='👤'"/>`;
    } else {
      hdrAv.innerHTML=userName?userName[0].toUpperCase():'👤';
    }
    document.getElementById('hdrName').textContent=userName||'User';
    document.getElementById('hdrStatus').textContent='Loading…';
    document.getElementById('hdrStatus').className='hdr-status';
    document.getElementById('hdrDot').className='hdr-online-dot';

    document.getElementById('chatWindow').classList.add('open');
    clearReply();

    loadMessages();
    updatePartnerStatus();
    subscribeMessages();
    subscribeTyping();
    markAllRead();

    statusInt=setInterval(()=>{ if(partner) updatePartnerStatus(); },30000);

    // Handle back gesture on mobile (popstate)
    history.pushState({chat:true},'');
    window.onpopstate=()=>closeChat();
  }

  function closeChat(){
    document.getElementById('chatWindow').classList.remove('open');
    window.onpopstate=null;
    if(msgChannel){ supabaseClient.removeChannel(msgChannel); msgChannel=null; }
    if(typChan){ supabaseClient.removeChannel(typChan); typChan=null; }
    clearTimeout(typingTimer);
    clearTimeout(typingShowTimer);
    clearInterval(statusInt);
    isTypingNow=false;
    partner=null;
    replyTo=null;
    hideRxnPicker();
    loadChats();
  }

  function viewProfile(){
    if(partner) window.location.href='profile.html?view='+partner.id;
  }

  /* ══════════════════════════════════════════════════
     PARTNER STATUS
  ══════════════════════════════════════════════════ */
  async function updatePartnerStatus(){
    if(!partner) return;
    try{
      const {data}=await supabaseClient.from('profiles').select('last_seen').eq('id',partner.id).single();
      const el=document.getElementById('hdrStatus');
      const dot=document.getElementById('hdrDot');
      if(!el) return;
      const online=isOnline(data?.last_seen);
      el.textContent=lastSeenText(data?.last_seen);
      el.className='hdr-status'+(online?' online-text':'');
      if(dot) dot.className='hdr-online-dot'+(online?' online':'');
    }catch{}
  }

  /* ══════════════════════════════════════════════════
     MESSAGES — LOAD
  ══════════════════════════════════════════════════ */
  async function loadMessages(keepPos){
    if(!partner) return;
    const area=document.getElementById('msgsArea');
    const prevDiff=area.scrollHeight-area.scrollTop;

    try{
      const {data:msgs,error}=await supabaseClient.from('messages').select('*')
        .or(`and(from_user.eq.${myId},to_user.eq.${partner.id}),and(from_user.eq.${partner.id},to_user.eq.${myId})`)
        .order('created_at',{ascending:true});

      if(error) throw error;
      if(!msgs||!msgs.length){
        showChatIntro();
        return;
      }

      document.getElementById('chatIntro').style.display='none';
      let html='';
      let lastDate='';
      let lastSender='';

      msgs.forEach((msg,i)=>{
        const mDate=new Date(msg.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        const yesterday=new Date(Date.now()-86400000).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

        if(mDate!==lastDate){
          html+=`<div class="date-sep"><span>${mDate===today?'Today':mDate===yesterday?'Yesterday':mDate}</span></div>`;
          lastDate=mDate;
          lastSender='';
        }

        const sent=msg.from_user===myId;
        const cls=sent?'sent':'recv';
        const side=sent?'sent':'received';
        const next=msgs[i+1];
        const isLast=!next||next.from_user!==msg.from_user;
        const isSameAsPrev=lastSender===msg.from_user;

        lastSender=msg.from_user;

        const time=msgTimeStr(msg.created_at);
        const ticks=sent?`<span class="ticks ${msg.seen?'seen':'delivered'}">${msg.seen?'✓✓':'✓'}</span>`:'';

        // Reactions
        let rxnsHtml='';
        if(msg.reactions&&Object.keys(msg.reactions).length){
          const grouped={};
          Object.values(msg.reactions).forEach(r=>{ grouped[r.emoji]=(grouped[r.emoji]||0)+1; });
          rxnsHtml=`<div class="msg-reactions">`+Object.entries(grouped).map(([em,cnt])=>`
            <span class="msg-rxn" onclick="reactWith('${em}','${msg.id}')">${em} ${cnt>1?cnt:''}</span>`).join('')+`</div>`;
        }

        // Reply ref
        let replyHtml='';
        if(msg.reply_to_text){
          replyHtml=`<div style="background:rgba(255,255,255,0.06);border-left:2px solid rgba(255,107,157,0.5);border-radius:8px;padding:5px 9px;margin-bottom:5px;font-size:0.72rem;color:var(--text-muted);">${esc(trunc(msg.reply_to_text,60))}</div>`;
        }

        // Avatar (only for received, only on last in group)
        const avHtml=!sent&&isLast
          ? `<div class="msg-av">${partner.avatar?`<img src="${esc(partner.avatar)}" onerror="this.innerHTML='👤'"/>`:(partner.name?partner.name[0].toUpperCase():'👤')}</div>`
          : (!sent?`<div class="msg-av hide"></div>`:'');

        let bubbleInner='';
        if(msg.is_voice&&msg.voice_url){
          const bars=[8,14,20,12,18,10,16,20,14,8,18,14,20,12,10];
          bubbleInner=`<div class="voice-bubble">
            <button class="voice-play" onclick="playVoice('${esc(msg.voice_url)}',this)"><i class="fas fa-play"></i></button>
            <div class="voice-waveform">${bars.map(h=>`<div class="wv-bar" style="height:${h}px;"></div>`).join('')}</div>
            <span class="voice-dur">${msg.voice_duration||'0:05'}</span>
          </div>`;
        } else {
          bubbleInner=replyHtml+esc(msg.text||'');
        }

        html+=`<div class="msg-wrap ${side}" id="msg-${msg.id}" data-id="${msg.id}" data-text="${esc(msg.text||'')}">
          ${avHtml}
          <div class="msg-col">
            <div class="bubble ${cls}" ontouchstart="startLongPress('${msg.id}',event)" ontouchend="endLongPress()" ontouchmove="endLongPress()" oncontextmenu="showRxnPicker('${msg.id}',event);return false;">
              ${bubbleInner}
            </div>
            ${rxnsHtml}
            <div class="msg-foot"><span class="msg-time">${time}</span>${ticks}</div>
          </div>
        </div>`;
      });

      area.innerHTML=html+'<div id="typingIndicator"></div>';

      if(keepPos){
        area.scrollTop=area.scrollHeight-prevDiff;
      } else {
        scrollToBottom();
      }

      // Show/hide scroll-down button
      area.addEventListener('scroll',handleAreaScroll,{passive:true});

    } catch(e){
      console.error('loadMessages error',e);
      showToast('❌ Failed to load messages');
    }
  }

  function showChatIntro(){
    const questions=[
      '👋 Hey! Which exam are you preparing for?',
      '📚 What does your daily study schedule look like?',
      '🎯 What are your goals after the exam?',
      '📍 Which district are you from?',
      '🌙 Are you a night owl or early riser for studying?',
      '💪 How do you stay motivated during prep?',
      '🧪 What\'s your favourite subject?',
      '🎵 Music on or off while studying?'
    ];
    const picks=questions.sort(()=>0.5-Math.random()).slice(0,3);
    const av=partner.avatar
      ?`<img src="${esc(partner.avatar)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.parentElement.textContent='${partner.name?partner.name[0].toUpperCase():'👤'}'">`
      :(partner.name?partner.name[0].toUpperCase():'👤');
    document.getElementById('msgsArea').innerHTML=`
      <div style="display:flex;flex-direction:column;align-items:center;padding:32px 20px 24px;gap:6px;text-align:center;">
        <div class="chat-intro-av">${av}</div>
        <div class="chat-intro-name">${esc(partner.name||'Your Match')}</div>
        <div class="chat-intro-sub">You matched! Start the conversation 💬</div>
        <span class="chat-intro-heart">💕</span>
        <div class="icebreakers">
          <div class="ice-label">💡 Break the ice</div>
          <div class="ice-chips" id="iceChips">
            ${picks.map(q=>`<button class="ice-chip">${esc(q)}</button>`).join('')}
          </div>
        </div>
      </div>`;
    document.querySelectorAll('.ice-chip').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const inp=document.getElementById('msgInput');
        if(inp){inp.value=btn.textContent;inp.focus();inp.dispatchEvent(new Event('input'));}
      });
    });
  }

  function scrollToBottom(smooth){
    const area=document.getElementById('msgsArea');
    if(smooth) area.scrollTo({top:area.scrollHeight,behavior:'smooth'});
    else area.scrollTop=area.scrollHeight;
    document.getElementById('scrollDownBtn').classList.remove('show');
  }

  function handleAreaScroll(){
    const area=document.getElementById('msgsArea');
    const btn=document.getElementById('scrollDownBtn');
    const isNearBottom=area.scrollHeight-area.scrollTop-area.clientHeight<120;
    btn.classList.toggle('show',!isNearBottom);
  }

  /* ══════════════════════════════════════════════════
     MARK READ
  ══════════════════════════════════════════════════ */
  async function markAllRead(){
    if(!partner) return;
    try{
      await supabaseClient.from('messages').update({seen:true})
        .eq('from_user',partner.id).eq('to_user',myId).eq('seen',false);
    }catch{}
  }

  /* ══════════════════════════════════════════════════
     SEND MESSAGE
  ══════════════════════════════════════════════════ */
  async function sendMessage(){
    const input=document.getElementById('msgInput');
    const text=input.value.trim();
    if(!text||!partner) return;
    input.value=''; input.style.height='auto';
    clearTimeout(typingTimer);
    broadcastTyping(false); isTypingNow=false;

    const payload={
      from_user:myId, to_user:partner.id,
      text, seen:false,
      reply_to_text:replyTo?.text||null,
      reply_to_id:replyTo?.id||null
    };
    clearReply();

    // Optimistic append
    appendOptimistic(text);

    try{
      const {error}=await supabaseClient.from('messages').insert(payload);
      if(error) throw error;
    }catch(e){
      showToast('❌ Failed to send');
      console.error(e);
    }
  }

  function appendOptimistic(text){
    const area=document.getElementById('msgsArea');
    const typEl=document.getElementById('typingIndicator');
    const div=document.createElement('div');
    div.className='msg-wrap sent';
    div.style.opacity='0.7';
    div.innerHTML=`<div class="msg-col"><div class="bubble sent">${esc(text)}</div><div class="msg-foot"><span class="msg-time">Sending…</span></div></div>`;
    area.insertBefore(div,typEl||null);
    scrollToBottom();
  }

  /* ══════════════════════════════════════════════════
     REAL-TIME SUBSCRIPTIONS
  ══════════════════════════════════════════════════ */
  function subscribeMessages(){
    if(msgChannel){ supabaseClient.removeChannel(msgChannel); }
    msgChannel=supabaseClient.channel('msgs-'+[myId,partner.id].sort().join('-'))
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},async payload=>{
        const m=payload.new;
        const relevant=(m.from_user===partner.id&&m.to_user===myId)||(m.from_user===myId&&m.to_user===partner.id);
        if(relevant){
          await loadMessages();
          if(m.from_user===partner.id) await markAllRead();
        }
      })
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},async ()=>{
        await loadMessages(true);
      })
      .subscribe();
  }

  function subscribeTyping(){
    if(typChan){ supabaseClient.removeChannel(typChan); }
    const ch=[myId,partner.id].sort().join('-');
    typChan=supabaseClient.channel('typing-'+ch)
      .on('broadcast',{event:'typing'},({payload})=>{
        if(payload.user_id===partner.id) showTyping(payload.is_typing);
      })
      .subscribe();
  }

  function showTyping(show){
    clearTimeout(typingShowTimer);
    const el=document.getElementById('typingIndicator');
    if(!el) return;
    if(show){
      el.innerHTML=`<div class="msg-wrap received"><div class="msg-av" style="visibility:hidden;"></div><div class="msg-col"><div class="typing-bubble"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div></div></div>`;
      scrollToBottom();
      typingShowTimer=setTimeout(()=>{ if(el) el.innerHTML=''; },5000);
    } else {
      el.innerHTML='';
    }
  }

  /* ══════════════════════════════════════════════════
     TYPING BROADCAST
  ══════════════════════════════════════════════════ */
  function onTyping(){
    if(!typChan||!partner) return;
    if(!isTypingNow){
      isTypingNow=true;
      broadcastTyping(true);
    }
    clearTimeout(typingTimer);
    typingTimer=setTimeout(()=>{ broadcastTyping(false); isTypingNow=false; },2500);
  }

  function broadcastTyping(v){
    if(!typChan) return;
    typChan.send({type:'broadcast',event:'typing',payload:{user_id:myId,is_typing:v}});
  }

  /* ══════════════════════════════════════════════════
     REPLY TO MESSAGE
  ══════════════════════════════════════════════════ */
  function setReply(msgId,msgText,senderName){
    replyTo={id:msgId,text:msgText};
    document.getElementById('replyName').textContent=senderName;
    document.getElementById('replyText').textContent=trunc(msgText,80);
    document.getElementById('replyPreview').classList.add('show');
    document.getElementById('msgInput').focus();
  }

  function clearReply(){
    replyTo=null;
    document.getElementById('replyPreview').classList.remove('show');
  }

  /* ══════════════════════════════════════════════════
     REACTIONS
  ══════════════════════════════════════════════════ */
  function startLongPress(msgId,e){
    longPressTimer=setTimeout(()=>{
      showRxnPicker(msgId,e);
    },600);
  }
  function endLongPress(){ clearTimeout(longPressTimer); }

  function showRxnPicker(msgId,e){
    activeRxnId=msgId;
    const picker=document.getElementById('rxnPicker');
    picker.classList.add('show');
    const x=Math.min(e.clientX||e.touches?.[0]?.clientX||100,window.innerWidth-200);
    const y=Math.max((e.clientY||e.touches?.[0]?.clientY||300)-70,10);
    picker.style.left=x+'px';
    picker.style.top=y+'px';
    e.preventDefault();
  }

  function hideRxnPicker(){
    document.getElementById('rxnPicker').classList.remove('show');
    activeRxnId=null;
  }

  document.addEventListener('click',e=>{
    if(!e.target.closest('#rxnPicker')&&!e.target.closest('.bubble')) hideRxnPicker();
  });

  async function reactWith(emoji,msgId){
    const id=msgId||activeRxnId;
    hideRxnPicker();
    if(!id) return;
    try{
      const {data:msg}=await supabaseClient.from('messages').select('reactions').eq('id',id).single();
      const rxns=msg?.reactions||{};
      if(rxns[myId]?.emoji===emoji){ delete rxns[myId]; }
      else { rxns[myId]={emoji,ts:Date.now()}; }
      await supabaseClient.from('messages').update({reactions:rxns}).eq('id',id);
      await loadMessages(true);
    }catch(e){ console.error(e); }
  }

  /* ══════════════════════════════════════════════════
     VOICE MESSAGES
  ══════════════════════════════════════════════════ */
  async function toggleVoice(){
    if(mediaRec&&mediaRec.state==='recording'){ stopAndSendVoice(); return; }
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRec=new MediaRecorder(stream);
      audioChunks=[];
      mediaRec.ondataavailable=e=>{ if(e.data.size>0) audioChunks.push(e.data); };
      mediaRec.start(100);
      recSecs=0;
      document.getElementById('voiceRecBar').classList.add('show');
      document.getElementById('micBtn').classList.add('recording');
      recInt=setInterval(()=>{
        recSecs++;
        const m=Math.floor(recSecs/60); const s=recSecs%60;
        document.getElementById('recTimerTxt').textContent=m+':'+(s<10?'0':'')+s;
      },1000);
    }catch(e){
      showToast('❌ Microphone access denied');
    }
  }

  function cancelVoice(){
    if(mediaRec){ mediaRec.stop(); mediaRec.stream?.getTracks().forEach(t=>t.stop()); mediaRec=null; }
    clearInterval(recInt); audioChunks=[];
    document.getElementById('voiceRecBar').classList.remove('show');
    document.getElementById('micBtn').classList.remove('recording');
  }

  async function stopAndSendVoice(){
    if(!mediaRec) return;
    clearInterval(recInt);
    const dur=recSecs;
    const m=Math.floor(dur/60); const s=dur%60;
    const durStr=m+':'+(s<10?'0':'')+s;

    mediaRec.stop();
    mediaRec.stream?.getTracks().forEach(t=>t.stop());
    await new Promise(r=>{ mediaRec.onstop=r; });

    const blob=new Blob(audioChunks,{type:'audio/webm'});
    audioChunks=[]; mediaRec=null;
    document.getElementById('voiceRecBar').classList.remove('show');
    document.getElementById('micBtn').classList.remove('recording');

    if(blob.size<500){ showToast('Recording too short'); return; }

    try{
      showToast('📤 Sending voice…');
      const path=`voice/${myId}/${Date.now()}.webm`;
      const {error:upErr}=await supabaseClient.storage.from('chat_voice').upload(path,blob,{contentType:'audio/webm'});
      if(upErr) throw upErr;
      const {data:urlData}=supabaseClient.storage.from('chat_voice').getPublicUrl(path);
      await supabaseClient.from('messages').insert({
        from_user:myId, to_user:partner.id,
        is_voice:true, voice_url:urlData.publicUrl, voice_duration:durStr,
        text:'Voice message', seen:false
      });
      await loadMessages();
    }catch(e){
      showToast('❌ Failed to send voice');
      console.error(e);
    }
  }

  function playVoice(url,btn){
    const audio=new Audio(url);
    const icon=btn.querySelector('i');
    icon.className='fas fa-pause';
    audio.play();
    audio.onended=()=>{ icon.className='fas fa-play'; };
    audio.onerror=()=>{ showToast('❌ Could not play audio'); icon.className='fas fa-play'; };
    btn.onclick=()=>{ audio.paused?audio.play():audio.pause(); icon.className=audio.paused?'fas fa-play':'fas fa-pause'; };
  }

  function clearLocalHistory(){
    if(!confirm('Clear chat display? Messages are not deleted from the server.')) return;
    const area=document.getElementById('msgsArea');
    area.innerHTML='<div id="typingIndicator"></div>';
    showChatIntro();
  }

  /* ══════════════════════════════════════════════════
     HAMBURGER MENU
  ══════════════════════════════════════════════════ */
  document.getElementById('hamburgerBtn').addEventListener('click',()=>{
    document.getElementById('mobileMenu').classList.toggle('open');
  });
  document.addEventListener('click',e=>{
    if(!e.target.closest('#mobileMenu')&&!e.target.closest('#hamburgerBtn')){
      document.getElementById('mobileMenu').classList.remove('open');
    }
  });

  /* ══════════════════════════════════════════════════
     CLEAR UNREAD BADGE — user is on the chat page
  ══════════════════════════════════════════════════ */
  localStorage.removeItem('eh_unread_chat');

  /* ══════════════════════════════════════════════════
     START
  ══════════════════════════════════════════════════ */
  init();
</script>
<script>
  // ── In-chat message search ────────────────────────────────────
  function toggleMsgSearch() {
    const bar = document.getElementById('msgSearchBar');
    const open = bar.classList.toggle('show');
    if (open) { document.getElementById('msgSearchInput').focus(); }
    else { closeMsgSearch(); }
  }
  function closeMsgSearch() {
    document.getElementById('msgSearchBar').classList.remove('show');
    const inp = document.getElementById('msgSearchInput');
    if (inp) inp.value = '';
    document.querySelectorAll('.msg-wrap').forEach(r => r.classList.remove('search-dim', 'search-match'));
    const cnt = document.getElementById('msgSearchCount');
    if (cnt) cnt.textContent = '';
  }
  function filterMessages(q) {
    const rows = document.querySelectorAll('.msg-wrap');
    if (!q.trim()) {
      rows.forEach(r => r.classList.remove('search-dim', 'search-match'));
      document.getElementById('msgSearchCount').textContent = '';
      return;
    }
    const lower = q.toLowerCase();
    let count = 0, first = null;
    rows.forEach(r => {
      const bubble = r.querySelector('.bubble');
      const txt = (bubble?.textContent || '').toLowerCase();
      if (txt.includes(lower)) {
        r.classList.remove('search-dim'); r.classList.add('search-match');
        if (!first) first = r; count++;
      } else {
        r.classList.add('search-dim'); r.classList.remove('search-match');
      }
    });
    document.getElementById('msgSearchCount').textContent = count ? `${count} result${count !== 1 ? 's' : ''}` : 'No results';
    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('msgSearchBar')?.classList.contains('show')) closeMsgSearch();
  });
</script>
